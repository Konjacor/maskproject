{
  "runtime": {
    "tracking_mode": "upper_face",
    "render_mode": "preset",
    "fps_target": 10,
    "max_frames": 24,
    "logger_name": "face_mask"
  },
  "sensor": {
    "type": "mock",
    "profile": "cycle_states",
    "width": 640,
    "height": 480,
    "seed": 11,
    "noise": 0.02,
    "base_brightness": 56,
    "state_period_seconds": 1.4
  },
  "features": {
    "eye_smoothing_alpha": 0.5,
    "brow_smoothing_alpha": 0.28
  },
  "state_machine": {
    "min_hold_ms": 160,
    "sleepy_enter": 0.26,
    "sleepy_exit": 0.36,
    "surprised_brow_enter": 0.42,
    "surprised_brow_exit": 0.25,
    "cheerful_brow_enter": 0.16
  },
  "renderer": {
    "resolution": 16
  },
  "output": {
    "always_print_ascii": false
  },
  "logging": {
    "level": "DEBUG",
    "file": "logs/mock_upper_face.log",
    "json": true
  }
}
