{
  "runtime": {
    "tracking_backend": "legacy",
    "tracking_mode": "upper_face",
    "render_mode": "procedural",
    "fps_target": 12,
    "max_frames": 20,
    "logger_name": "face_mask"
  },
  "sensor": {
    "type": "mock",
    "profile": "wave_features",
    "width": 640,
    "height": 480,
    "seed": 7,
    "noise": 0.03,
    "base_brightness": 48,
    "eye_speed": 1.8,
    "brow_speed": 0.9,
    "infrared_mode": false,
    "hotspots": false
  },
  "features": {
    "eye_smoothing_alpha": 0.45,
    "brow_smoothing_alpha": 0.25
  },
  "state_machine": {
    "min_hold_ms": 180,
    "sleepy_enter": 0.28,
    "sleepy_exit": 0.38,
    "surprised_brow_enter": 0.45,
    "surprised_brow_exit": 0.28,
    "cheerful_brow_enter": 0.18
  },
  "renderer": {
    "resolution": 16
  },
  "output": {
    "always_print_ascii": false
  },
  "logging": {
    "level": "DEBUG",
    "file": "logs/face_mask.log",
    "json": true
  }
}
